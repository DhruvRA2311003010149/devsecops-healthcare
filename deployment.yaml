apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-deployment
  namespace: healthcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthcare
  template:
    metadata:
      labels:
        app: healthcare
    spec:
      containers:
      - name: healthcare
        image: localhost:5000/healthcare:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "128Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: healthcare-service
  namespace: healthcare
spec:
  type: NodePort
  selector:
    app: healthcare
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30092
    